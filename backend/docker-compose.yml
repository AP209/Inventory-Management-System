version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: inventory_db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourYour_password123!
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  api:
    build:
      context: ./InventoryManagement.Backend
      dockerfile: Dockerfile
    container_name: inventory_api
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=InventoryDb;User Id=sa;Password=YourYour_password123!;TrustServerCertificate=True;
      - Jwt__Key=SuperSecretKeyForInventoryManagementSystemWhichIsLongEnough123!
      - Jwt__Issuer=InventoryManagementBackend
      - Jwt__Audience=InventoryManagementClients

volumes:
  sql_data:
